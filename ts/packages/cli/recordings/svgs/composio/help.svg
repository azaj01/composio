 text] [--limit integer] &lt;query&gt;</tspan></text><text y="1295" xml:space="preserve"><tspan class="t">                                  Search tools by use case.</tspan></text><text y="1345" xml:space="preserve"><tspan class="t p">&gt; </tspan><tspan class="t ca" style="fill:#dddddd;">█</tspan></text></g></g></svg></svg>