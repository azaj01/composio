<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="1500"><rect width="1200" height="1500" rx="0" fill="#171717"/><svg x="60" y="60" width="1080" height="1380" viewBox="0 0 1080 1380"><rect width="1080" height="1380" fill="#171717"/><style>@keyframes typing_0 {  from { width: 0; }  to { width: 182px; }}.typing_0 {  overflow: hidden;  white-space: nowrap;  display: inline-block;  animation: typing_0 0.18s steps(13, end) forwards;  animation-delay: 0.02s;}@keyframes slide {  0% { transform: translateX(0px); }  1.7% { transform: translateX(-1080px); }  3.4% { transform: translateX(-2160px); }  5.1% { transform: translateX(-3240px); }  6.8% { transform: translateX(-4320px); }  8.5% { transform: translateX(-5400px); }  10.2% { transform: translateX(-6480px); }  11.9% { transform: translateX(-7560px); }  16.9% { transform: translateX(-8640px); }  59.3% { transform: translateX(-9720px); }  79.7% { transform: translateX(-10800px); }  81.4% { transform: translateX(-11880px); }  100% { transform: translateX(-11880px); }}.animation-container {  animation: slide 1.2s step-end 0s infinite;}.t { fill: #dddddd; font-family: JetBrains Mono,DejaVu Sans Mono,Menlo,Bitstream Vera Sans Mono,Inconsolata,Roboto Mono,Hack,Consolas,ui-monospace,monospace,Apple Symbols, monospace; font-size: 22px; }.c { fill: #04D7D7; }.w { fill: #bfbfbf; }.k { fill: #282a2e; }.r { fill: #D74E6F; }.g { fill: #31BB71; }.y { fill: #D3E561; }.b { fill: #8056FF; }.m { fill: #ED61D7; }.p { fill: #9B79FF; }.ca { }@keyframes blink { 0%, 49% { opacity: 1; } 50%, 100% { opacity: 0; } }.ci { animation: blink 1s infinite; }</style><defs></defs><g class="animation-container"><g transform="translate(0,0)"><text y="20" xml:space="preserve"><tspan class="t p">&gt; </tspan><tspan class="t"># Show composio command help</tspan></text><text y="45" xml:space="preserve"><tspan class="t p">&gt; </tspan><tspan class="t">co</tspan><tspan class="t ca" style="fill:#dddddd;">█</tspan></text></g><g transform="translate(1080,0)"><text y="20" xml:space="preserve"><tspan class="t p">&gt; </tspan><tspan class="t"># Show composio command help</tspan></text><text y="45" xml:space="preserve"><tspan class="t p">&gt; </tspan><tspan class="t">com</tspan><tspan class="t ca" style="fill:#dddddd;">█</tspan></text></g><g transform="translate(2160,0)"><text y="20" xml:space="preserve"><tspan class="t p">&gt; </tspan><tspan class="t"># Show composio command help</tspan></text><text y="45" xml:space="preserve"><tspan class="t p">&gt; </tspan><tspan class="t">compo</tspan><tspan class="t ca" style="fill:#dddddd;">█</tspan></text></g><g transform="translate(3240,0)"><text y="20" xml:space="preserve"><tspan class="t p">&gt; </tspan><tspan class="t"># Show composio command help</tspan></text><text y="45" xml:space="preserve"><tspan class="t p">&gt; </tspan><tspan class="t">compos</tspan><tspan class="t ca" style="fill:#dddddd;">█</tspan></text></g><g transform="translate(4320,0)"><text y="20" xml:space="preserve"><tspan class="t p">&gt; </tspan><tspan class="t"># Show composio command help</tspan></text><text y="45" xml:space="preserve"><tspan class="t p">&gt; </tspan><tspan class="t">composio </tspan><tspan class="t ca" style="fill:#dddddd;">█</tspan></text></g><g transform="translate(5400,0)"><text y="20" xml:space="preserve"><tspan class="t p">&gt; </tspan><tspan class="t"># Show composio command help</tspan></text><text y="45" xml:space="preserve"><tspan class="t p">&gt; </tspan><tspan class="t">composio --</tspan><tspan class="t ca" style="fill:#dddddd;">█</tspan></text></g><g transform="translate(6480,0)"><text y="20" xml:space="preserve"><tspan class="t p">&gt; </tspan><tspan class="t"># Show composio command help</tspan></text><text y="45" xml:space="preserve"><tspan class="t p">&gt; </tspan><tspan class="t">composio --h</tspan><tspan class="t ca" style="fill:#dddddd;">█</tspan></text></g><g transform="translate(7560,0)"><text y="20" xml:space="preserve"><tspan class="t p">&gt; </tspan><tspan class="t"># Show composio command help</tspan></text><text y="45" xml:space="preserve"><tspan class="t p">&gt; </tspan><tspan class="t">composio --help</tspan><tspan class="t ca" style="fill:#dddddd;">█</tspan></text></g><g transform="translate(8640,0)"><text y="20" xml:space="preserve"><tspan class="t p">&gt; </tspan><tspan class="t"># Show composio command help</tspan></text><text y="45" xml:space="preserve"><tspan class="t p">&gt; </tspan><tspan class="t">composio --help</tspan></text><text y="70" xml:space="preserve"><tspan x="0"></tspan><tspan class="t ca" style="fill:#dddddd;">█</tspan></text></g><g transform="translate(9720,0)"><text y="20" xml:space="preserve"><tspan class="t p">&gt; </tspan><tspan class="t"># Show composio command help</tspan></text><text y="45" xml:space="preserve"><tspan class="t p">&gt; </tspan><tspan class="t">composio --help</tspan></text><text y="70" xml:space="preserve"><tspan x="0"></tspan><tspan class="t ci" style="fill:#dddddd;">█</tspan></text></g><g transform="translate(10800,0)"><text y="20" xml:space="preserve"><tspan class="t">..                                Generate type stubs for toolkits, tools,</tspan></text><text y="45" xml:space="preserve"><tspan class="t">and triggers, auto-detecting project language (TypeScript | Python)</tspan></text><text y="95" xml:space="preserve"><tspan class="t">  - py</tspan></text><text y="120" xml:space="preserve"><tspan class="t">                                  Handle Python projects.</tspan></text><text y="170" xml:space="preserve"><tspan class="t">  - py generate [(-o, --output-dir directory)] --toolkits text...</tspan></text><text y="195" xml:space="preserve"><tspan class="t">                                  Generate Python type stubs for toolkits,</tspan></text><text y="220" xml:space="preserve"><tspan class="t">tools, and triggers from the Composio API.</tspan></text><text y="270" xml:space="preserve"><tspan class="t">Environment Variables:</tspan></text><text y="295" xml:space="preserve"><tspan class="t">  COMPOSIO_TOOLKIT_VERSION_&lt;TOOLKIT&gt;  Override toolkit version (e.g., COMPO</tspan></text><text y="320" xml:space="preserve"><tspan class="t">SIO_TOOLKIT_VERSION_GMAIL=20250901_00)</tspan></text><text y="345" xml:space="preserve"><tspan class="t">                                      Use &#34;latest&#34; or unset to use the late</tspan></text><text y="370" xml:space="preserve"><tspan class="t">st version.</tspan></text><text y="420" xml:space="preserve"><tspan class="t">  - ts</tspan></text><text y="445" xml:space="preserve"><tspan class="t">                                  Handle TypeScript projects.</tspan></text><text y="495" xml:space="preserve"><tspan class="t">  - ts generate [(-o, --output-dir directory)] [--compact] [--transpiled] [</tspan></text><text y="520" xml:space="preserve"><tspan class="t">--type-tools] --toolkits text...  Generate TypeScript types for toolkits, t</tspan></text><text y="545" xml:space="preserve"><tspan class="t">ools, and triggers from the Composio API.</tspan></text><text y="595" xml:space="preserve"><tspan class="t">Environment Variables:</tspan></text><text y="620" xml:space="preserve"><tspan class="t">  COMPOSIO_TOOLKIT_VERSION_&lt;TOOLKIT&gt;  Override toolkit version (e.g., COMPO</tspan></text><text y="645" xml:space="preserve"><tspan class="t">SIO_TOOLKIT_VERSION_GMAIL=20250901_00)</tspan></text><text y="670" xml:space="preserve"><tspan class="t">                                      Use &#34;latest&#34; or unset to use the late</tspan></text><text y="695" xml:space="preserve"><tspan class="t">st version.</tspan></text><text y="745" xml:space="preserve"><tspan class="t">  - toolkits</tspan></text><text y="770" xml:space="preserve"><tspan class="t">                                  Discover and inspect Composio toolkits.</tspan></text><text y="820" xml:space="preserve"><tspan class="t">  - toolkits list [--query text] [--limit integer]</tspan></text><text y="845" xml:space="preserve"><tspan class="t">                                  List available toolkits.</tspan></text><text y="895" xml:space="preserve"><tspan class="t">  - toolkits info [&lt;slug&gt;]</tspan></text><text y="920" xml:space="preserve"><tspan class="t">                                  View details of a specific toolkit.</tspan></text><text y="970" xml:space="preserve"><tspan class="t">  - toolkits search [--limit integer] &lt;query&gt;</tspan></text><text y="995" xml:space="preserve"><tspan class="t">                                  Search toolkits by use case.</tspan></text><text y="1045" xml:space="preserve"><tspan class="t">  - tools</tspan></text><text y="1070" xml:space="preserve"><tspan class="t">                                  Discover and inspect Composio tools.</tspan></text><text y="1120" xml:space="preserve"><tspan class="t">  - tools list [--search text] [--toolkits text] [--tags text] [--limit int</tspan></text><text y="1145" xml:space="preserve"><tspan class="t">eger]                             List available tools.</tspan></text><text y="1195" xml:space="preserve"><tspan class="t">  - tools info [&lt;slug&gt;]</tspan></text><text y="1220" xml:space="preserve"><tspan class="t">                                  View details of a specific tool.</tspan></text><text y="1270" xml:space="preserve"><tspan class="t">  - tools search [--toolkits text] [--limit integer] &lt;query&gt;</tspan></text><text y="1295" xml:space="preserve"><tspan class="t">                                  Search tools by use case.</tspan></text><text y="1345" xml:space="preserve"><tspan x="0"></tspan><tspan class="t ca" style="fill:#dddddd;">█</tspan></text></g><g transform="translate(11880,0)"><text y="20" xml:space="preserve"><tspan class="t">..                                Generate type stubs for toolkits, tools,</tspan></text><text y="45" xml:space="preserve"><tspan class="t">and triggers, auto-detecting project language (TypeScript | Python)</tspan></text><text y="95" xml:space="preserve"><tspan class=